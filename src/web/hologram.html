<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILES — Hologram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
        #three-container { width: 100vw; height: 100vh; display: block; }
    </style>

    <!-- Three.js CDN import map (no npm/Electron needed) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="three-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ═══════════════════════════════════════════════════════════════
        // SCENE SETUP
        // ═══════════════════════════════════════════════════════════════
        const container = document.getElementById('three-container');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        // ═══════════════════════════════════════════════════════════════
        // LIGHTING
        // ═══════════════════════════════════════════════════════════════
        scene.add(new THREE.AmbientLight(0xffffff, 3.0));

        const dirLight = new THREE.DirectionalLight(0xffffff, 8.0);
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 4.0);
        fillLight.position.set(-5, 5, -5);
        scene.add(fillLight);

        const pointLight = new THREE.PointLight(0xff9900, 5, 100);
        pointLight.position.set(-5, 0, 5);
        scene.add(pointLight);

        // ═══════════════════════════════════════════════════════════════
        // MODEL LOADING
        // ═══════════════════════════════════════════════════════════════
        const loader = new GLTFLoader();
        const MODEL_SCALE = 3.0;
        let targetModel = null;

        function loadModel(url) {
            // Remove previous model
            if (targetModel) {
                scene.remove(targetModel);
                targetModel.traverse(child => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        if (Array.isArray(child.material)) {
                            child.material.forEach(m => m.dispose());
                        } else {
                            child.material.dispose();
                        }
                    }
                });
                targetModel = null;
            }

            loader.load(url,
                (gltf) => {
                    targetModel = gltf.scene;

                    // ── Auto-center at world origin (from spec) ────────────
                    const box    = new THREE.Box3().setFromObject(targetModel);
                    const size   = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    targetModel.position.sub(center);

                    // ── Normalize scale to fill view (from spec) ───────────
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale  = MODEL_SCALE / maxDim;
                    targetModel.scale.set(scale, scale, scale);

                    scene.add(targetModel);

                    // Reset interaction state on new model load
                    currentScale     = MODEL_SCALE;
                    targetScale      = MODEL_SCALE;
                    targetRotationY  = 0;
                    targetRotationX  = 0;
                    angularVelocity  = 0.5;
                    isPinching       = false;
                    isZooming        = false;
                },
                undefined,
                (err) => console.error('[MILES] Model load error:', err)
            );
        }

        // ═══════════════════════════════════════════════════════════════
        // INTERACTION STATE — EXACT VALUES FROM SPEC
        // ═══════════════════════════════════════════════════════════════

        // Physics constants
        let   angularVelocity  = 0.5;   // initial idle spin speed (rad/s)
        const FRICTION         = 0.98;  // velocity decay per frame
        const RETURN_SPEED     = 0.01;  // how fast it returns to idle spin
        const IDLE_SPIN_SPEED  = 0.5;   // target idle angular velocity

        // Pinch rotation state
        let isPinching      = false;
        let pinchStartX     = 0;
        let pinchStartY     = 0;
        let pinchStartRotY  = 0;
        let pinchStartRotX  = 0;
        let targetRotationY = 0;
        let targetRotationX = 0;

        // Zoom state
        let isZooming    = false;
        let baseHandSize = 0.25;
        let currentScale = MODEL_SCALE;
        let targetScale  = MODEL_SCALE;

        // Smoothing (lerp factors per frame)
        const ROTATION_SMOOTHING = 0.25;
        const SCALE_SMOOTHING    = 0.08;

        // ═══════════════════════════════════════════════════════════════
        // GESTURE HANDLER — exact logic from spec's renderer.js
        // ═══════════════════════════════════════════════════════════════
        function handleGestureData(rawString) {
            try {
                const v = rawString.trim().split(',').map(parseFloat);
                if (v.length < 8 || !targetModel) return;

                const newPinch = v[0] === 1;
                const pinchX   = v[1];
                const pinchY   = v[2];
                // v[3] = pinchZ (unused)
                const openHand = v[4] === 1;
                const handSize = v[5];
                // v[6] = wristX, v[7] = wristY (unused here — rotation uses pinchX/Y)

                // ── PINCH → ROTATE ────────────────────────────────────
                if (newPinch) {
                    if (!isPinching) {
                        // Record start state on pinch begin
                        isPinching      = true;
                        pinchStartX     = pinchX;
                        pinchStartY     = pinchY;
                        pinchStartRotY  = targetModel.rotation.y;
                        pinchStartRotX  = targetModel.rotation.x;
                        targetRotationY = targetModel.rotation.y;
                        targetRotationX = targetModel.rotation.x;
                        angularVelocity = 0; // stop idle spin on grab
                    }

                    // Rotation = start + delta (no drift accumulation)
                    targetRotationY = pinchStartRotY + ((pinchX - pinchStartX) * 8.0);
                    targetRotationX = THREE.MathUtils.clamp(
                        pinchStartRotX + ((pinchY - pinchStartY) * 6.0),
                        -1.2, 1.2  // prevent flipping
                    );

                    pointLight.color.setHex(0xff00ff);

                } else {
                    if (isPinching) {
                        // Snapshot current rotation as new target on release
                        targetRotationY = targetModel.rotation.y;
                        targetRotationX = targetModel.rotation.x;
                    }
                    isPinching = false;
                }

                // ── OPEN HAND → ZOOM ───────────────────────────────────
                if (openHand && !newPinch) {
                    if (!isZooming) {
                        isZooming    = true;
                        baseHandSize = handSize; // record baseline
                    }
                    const sizeDelta = handSize - baseHandSize;
                    targetScale = THREE.MathUtils.clamp(
                        MODEL_SCALE + (sizeDelta * 15.0),
                        0.5, 8.0
                    );
                    pointLight.color.setHex(0x00ffff);
                } else {
                    isZooming = false;
                }

                // ── IDLE: drift scale back to default ─────────────────
                if (!newPinch && !openHand) {
                    targetScale = THREE.MathUtils.lerp(targetScale, MODEL_SCALE, 0.02);
                    pointLight.color.setHex(0xff9900);
                }

            } catch (e) {
                console.error('[MILES] Gesture handler error:', e);
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // WEBSOCKET — receives both hand data (raw CSV) and model broadcasts (JSON)
        // ═══════════════════════════════════════════════════════════════
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl    = `${protocol}//${window.location.host}/ws/hologram/display`;
        let   ws;

        function connect() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('[MILES] WebSocket connected');
            };

            ws.onmessage = (event) => {
                const raw = event.data;

                // Try JSON first (model broadcast / structured command)
                try {
                    const msg = JSON.parse(raw);

                    if (msg.type === 'load_model') {
                        // Server sends { type:'load_model', url:'/models/...' }
                        const url = msg.url || msg.data?.url;
                        if (url) loadModel(url);
                        return;
                    }

                    // Any other JSON type that wraps hand data
                    if (msg.type === 'hand_data' || msg.type === 'udp') {
                        handleGestureData(msg.data || '');
                        return;
                    }

                } catch {
                    // Not JSON → raw CSV gesture packet from UDP bridge
                    handleGestureData(raw);
                }
            };

            ws.onclose = () => {
                console.log('[MILES] WebSocket closed — reconnecting in 2s…');
                setTimeout(connect, 2000);
            };

            ws.onerror = (e) => {
                console.error('[MILES] WebSocket error:', e);
            };
        }

        connect();

        // ═══════════════════════════════════════════════════════════════
        // ANIMATION LOOP — exact physics from spec
        // ═══════════════════════════════════════════════════════════════
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (targetModel) {
                if (isPinching) {
                    // Smoothly lerp to target rotation (rotationSmoothing = 0.25)
                    targetModel.rotation.y = THREE.MathUtils.lerp(
                        targetModel.rotation.y, targetRotationY, ROTATION_SMOOTHING
                    );
                    targetModel.rotation.x = THREE.MathUtils.lerp(
                        targetModel.rotation.x, targetRotationX, ROTATION_SMOOTHING
                    );
                } else {
                    // Physics-based idle spin
                    targetModel.rotation.y += angularVelocity * dt;
                    angularVelocity *= FRICTION;                                                   // decay
                    angularVelocity  = THREE.MathUtils.lerp(angularVelocity, IDLE_SPIN_SPEED, RETURN_SPEED); // return to spin
                    targetModel.rotation.x = THREE.MathUtils.lerp(targetModel.rotation.x, 0, dt * 0.5); // level out tilt
                }

                // Smooth scale (scaleSmoothing = 0.08)
                currentScale = THREE.MathUtils.lerp(currentScale, targetScale, SCALE_SMOOTHING);
                targetModel.scale.set(currentScale, currentScale, currentScale);
            }

            renderer.render(scene, camera);
        }

        animate();

        // ═══════════════════════════════════════════════════════════════
        // RESPONSIVE RESIZE
        // ═══════════════════════════════════════════════════════════════
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
